<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Email Anda | Tugasku</title>
    <!-- Link ke globals.css tidak akan berfungsi di email, jadi diabaikan -->
    <!-- Google Fonts juga tidak selalu didukung, jadi sertakan fallback font -->
</head>
<body style="margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; background-color: #f8f8f8; color: #333333; line-height: 1.6;">

    <!-- Outer table for full width background and centering -->
    <table width="100%" border="0" cellspacing="0" cellpadding="0" role="presentation" style="background-color: #f8f8f8;">
        <tr>
            <td align="center" style="padding: 20px;">
                <!-- Card Container Table -->
                <table width="100%" border="0" cellspacing="0" cellpadding="0" role="presentation" style="max-width: 450px; border-radius: 12px; background-color: #ffffff; border: 1px solid #e0e0e0; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); text-align: center;">
                    <tr>
                        <td style="padding: 30px;">
                            <!-- Card Icon -->
                            <div style="font-size: 48px; color: yellow; margin-bottom: 4px;">
                                📧
                            </div>
                            
                            <!-- Heading -->
                            <h1 style="font-size: 28px; font-weight: 600; color: #333333; margin-top: 0; margin-bottom: 15px;">
                                Konfirmasi Email Anda
                            </h1>
                            
                            <!-- Paragraph -->
                            <p style="font-size: 15px; color: #555555; margin-bottom: 25px;">
                                Terima kasih telah mendaftar di Tugasku! Untuk mengaktifkan akun Anda, silakan klik tombol di bawah ini untuk memverifikasi alamat email Anda.
                            </p>
                            
                            <!-- Button -->
                            <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: yellow; color: #fff; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 16px; border: 0;">
                                Verifikasi Email Sekarang
                            </a>
                            
                            
                        </td>
                    </tr>
                </table>
                <!-- End Card Container Table -->
            </td>
        </tr>
    </table>
    <!-- End Outer table -->

</body>
</html>
